version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: computerstore-db
    environment:
      POSTGRES_DB: ComputerStore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/computer_store.sql:/docker-entrypoint-initdb.d/computer_store.sql
    networks:
      - computerstore-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: computerstore-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ComputerStore
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123
    depends_on:
      - postgres
    volumes:
      - ./Backend/uploads:/app/uploads
    networks:
      - computerstore-network

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    container_name: computerstore-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - computerstore-network

volumes:
  postgres_data:

networks:
  computerstore-network:
    driver: bridge
